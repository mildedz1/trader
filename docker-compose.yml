services:
  trader_worker:
    build: .
    image: lbank-telegram-trader:latest
    container_name: lbank_trader_worker
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ALLOWED_CHAT_IDS=${ALLOWED_CHAT_IDS}
      - EXCHANGE_ID=lbank
      - LBANK_API_KEY=${LBANK_API_KEY}
      - LBANK_API_SECRET=${LBANK_API_SECRET}
      - SYMBOL=BTC/USDT
      - TIMEFRAME=1h
      - EMA_FAST=50
      - EMA_SLOW=200
      - RSI_PERIOD=14
      - RSI_ENTRY=30
      - RSI_EXIT=70
      - TICK_INTERVAL_SEC=15
      - RISK_POSITION_MODE=percent_of_balance
      - RISK_POSITION_SIZE=0.01
      - MAX_DAILY_LOSS_PCT=3
      - RESET_HOUR_UTC=0
      - MODE=demo
      - CONFIG_PATH=/data/config.json
      - LOG_PATH=/data/logs/worker.log
      - HEARTBEAT_PATH=/data/heartbeat
    volumes:
      - trader_data:/data
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
volumes:
  trader_data:
    driver: local