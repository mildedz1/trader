services:
  trader_worker:
    build: .
    image: lbank-telegram-trader:latest
    container_name: lbank_trader_worker
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ALLOWED_CHAT_IDS=${ALLOWED_CHAT_IDS}
      - EXCHANGE_ID=lbank
      - LBANK_API_KEY=${LBANK_API_KEY}
      - LBANK_API_SECRET=${LBANK_API_SECRET}
      - TRADE_MODE=${TRADE_MODE:-futures}
      - SYMBOL=${SYMBOL:-ETH/USDT}
      - TIMEFRAME=${TIMEFRAME:-30m}
      - FUTURES_SYMBOL=${FUTURES_SYMBOL:-ETH/USDT}
      - FUTURES_TIMEFRAME=${FUTURES_TIMEFRAME:-5m}
      - FUTURES_LEVERAGE=${FUTURES_LEVERAGE:-5}
      - FUTURES_POSITION_MODE=${FUTURES_POSITION_MODE:-isolated}
      - FUTURES_ALLOW_SHORT=${FUTURES_ALLOW_SHORT:-true}
      - USE_FULL_BALANCE=${USE_FULL_BALANCE:-true}
      - ST_ATR_PERIOD=${ST_ATR_PERIOD:-10}
      - ST_ATR_MULT=${ST_ATR_MULT:-2.5}
      - EMA_FAST=${EMA_FAST:-20}
      - EMA_SLOW=${EMA_SLOW:-50}
      - MACD_FAST=${MACD_FAST:-12}
      - MACD_SLOW=${MACD_SLOW:-26}
      - MACD_SIGNAL=${MACD_SIGNAL:-9}
      - SL_ATR_MULT=${SL_ATR_MULT:-1.0}
      - TP_RR=${TP_RR:-1.2}
      - TRAIL_ENABLE=${TRAIL_ENABLE:-true}
      - TRAIL_ATR_MULT=${TRAIL_ATR_MULT:-0.8}
      - COOLDOWN_CANDLES=${COOLDOWN_CANDLES:-1}
      - MAX_TRADES_PER_DAY=${MAX_TRADES_PER_DAY:-50}
      - MIN_SECONDS_BETWEEN_TRADES=${MIN_SECONDS_BETWEEN_TRADES:-30}
      - TICK_INTERVAL_SEC=${TICK_INTERVAL_SEC:-15}
      - RISK_POSITION_MODE=${RISK_POSITION_MODE:-fixed_amount}
      - RISK_POSITION_SIZE=${RISK_POSITION_SIZE:-1}
      - MAX_DAILY_LOSS_PCT=${MAX_DAILY_LOSS_PCT:-3}
      - RESET_HOUR_UTC=${RESET_HOUR_UTC:-0}
      - MODE=${MODE:-live}
      - LBANK_USE_NATIVE_SPOT=${LBANK_USE_NATIVE_SPOT:-true}
      - LBANK_USE_NATIVE_FUTURES=${LBANK_USE_NATIVE_FUTURES:-true}
      - CONFIG_PATH=/data/config.json
      - LOG_PATH=/data/logs/worker.log
      - HEARTBEAT_PATH=/data/heartbeat
    volumes:
      - trader_data:/data
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
volumes:
  trader_data:
    driver: local